[build]
  # Regenerate Rising Shows per-show SEO pages (and their sitemap)
  # from the committed data.json on every deploy. The output lives at
  # apps/rising-shows/shows/ and is intentionally gitignored.
  command = "npm run build:site"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# The site homepage lives at /home.html; "/" must be a clean edge 301 so
# Google indexes the real homepage. force = true makes this win over the
# committed index.html stub (which previously served at "/" carrying a
# noindex meta that de-indexed the domain root - GSC, 2026-06). The stub
# remains only as a local-dev / no-JS fallback.
[[redirects]]
  from = "/"
  to = "/home.html"
  status = 301
  force = true

# product.html was retired as part of the marketing/portfolio refresh.
# Its services content now lives at the top of /work.html. Permanent
# redirect so anyone with a bookmark or inbound link lands cleanly.
[[redirects]]
  from = "/product.html"
  to = "/work.html"
  status = 301
  force = true

# Extensionless variant in case anyone bookmarked /product without .html.
[[redirects]]
  from = "/product"
  to = "/work.html"
  status = 301
  force = true

# Mario Kart was renamed from tracker.html to index.html so every app shares
# the same entry filename. Permanent redirect preserves inbound links and
# anything Google already has indexed.
[[redirects]]
  from = "/apps/mario-kart/tracker.html"
  to = "/apps/mario-kart/"
  status = 301
  force = true

# Brain Arena was rebranded to "Arena" (it's no longer trivia-only; it's a
# hub for private-room party games with friends). The directory moved from
# /apps/brain-arena/ → /apps/arena/. The splat catches every deep link
# (success page, future per-game routes) so existing bookmarks + indexed
# pages forward cleanly.
[[redirects]]
  from = "/apps/brain-arena/*"
  to = "/apps/arena/:splat"
  status = 301
  force = true

# Rising Seasons was rebranded to "Rising Shows" and refocused from browsing
# individual seasons to ranking whole shows by the shape of their rating
# trend. The directory moved from /apps/rising-seasons/ → /apps/rising-shows/.
# The splat catches every deep link (the ~400 per-show SEO pages, the kometa
# builder, the A-Z index) so existing bookmarks and indexed pages forward
# cleanly with a permanent 301.
[[redirects]]
  from = "/apps/rising-seasons/*"
  to = "/apps/rising-shows/:splat"
  status = 301
  force = true

# Trip Planner started life as tools/trip-planner.html before graduating to
# a full app; keep the old URL working (extensionless variant included).
[[redirects]]
  from = "/tools/trip-planner*"
  to = "/apps/trip-planner/"
  status = 301
  force = true

# Baseline security headers for every response. The CSP is intentionally
# Report-Only because main.js (jQuery + the auth modal) sets element
# styles at runtime and writes inline event-style attributes via
# jQuery internals, so style-src 'unsafe-inline' is still required.
# Once that path is removed (or every offender is hashed), graduate to
# a real Content-Security-Policy header by renaming the directive below.
#
# connect-src is derived from every fetch() call site in client JS, not
# from memory - it drifted badly once already (2026-07-20 audit) and a
# Report-Only policy gives no feedback when it does. If you add a fetch
# to a new origin, add it here in the same change. Current non-obvious
# entries: *.googleapis.com already covers Gemini (generativelanguage)
# and Firestore; raw.githubusercontent.com is the Trip Planner visa
# matrix; the-trivia-api.com, query.wikidata.org and en.wikipedia.org
# are Arena question/location data; *.google-analytics.com (not just
# www) is required because GA4 beacons go to region1.google-analytics.com.
# Leaflet is NOT listed: it was self-hosted under apps/trip-planner/
# vendor/leaflet/ on 2026-07-20 and now loads from 'self'.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy-Report-Only = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cdnjs.cloudflare.com https://www.googletagmanager.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src 'self' data: https://cdnjs.cloudflare.com https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://*.firebasedatabase.app https://*.firebaseapp.com https://*.google-analytics.com https://*.analytics.google.com https://us-central1-jjexperiment-12af6.cloudfunctions.net https://maptap.gg https://nominatim.openstreetmap.org https://archive-api.open-meteo.com https://api.frankfurter.dev https://api.openai.com https://raw.githubusercontent.com https://the-trivia-api.com https://query.wikidata.org https://en.wikipedia.org wss://*.firebaseio.com; frame-src 'self' https://shevato-site.firebaseapp.com https://apis.google.com; object-src 'none'; base-uri 'self'; form-action 'self'"

# Long-cache static asset families. The exercise DB is content-addressed
# only by name today; if we add hashed bundles later, bump these and
# the Service Worker should refresh on its own.
[[headers]]
  for = "/apps/gym-tracker/js/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/apps/gym-tracker/css/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/apps/gym-tracker/data/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Existing override for the firebase-config function — kept tighter than
# the global headers because we don't want it framed at all.
[[headers]]
  for = "/.netlify/functions/firebase-config"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"