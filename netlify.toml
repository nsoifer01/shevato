[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Baseline security headers for every response. The CSP is intentionally
# Report-Only at first so we can deploy without breaking the existing
# inline jQuery-partials script in index.html. Once that inline script
# is moved to an external file (or hashed), graduate to a real
# Content-Security-Policy header by renaming the directive below.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy-Report-Only = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src 'self' data: https://cdnjs.cloudflare.com https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://*.firebasedatabase.app https://*.firebaseapp.com wss://*.firebaseio.com; frame-src 'self' https://*.firebaseapp.com; object-src 'none'; base-uri 'self'; form-action 'self'"

# Long-cache static asset families. The exercise DB is content-addressed
# only by name today; if we add hashed bundles later, bump these and
# the Service Worker should refresh on its own.
[[headers]]
  for = "/apps/gym-tracker/js/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/apps/gym-tracker/css/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/apps/gym-tracker/data/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Existing override for the firebase-config function — kept tighter than
# the global headers because we don't want it framed at all.
[[headers]]
  for = "/.netlify/functions/firebase-config"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"