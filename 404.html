<!DOCTYPE HTML>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>404 – Page Not Found | Shevato</title>
    <meta name="description" content="The page you requested could not be found on shevato.com. You will be redirected to the home page." />
    <meta name="robots" content="noindex, follow" />

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=UA-140119780-1"></script>
    <script defer src="/assets/js/analytics.js"></script>

    <link rel="stylesheet" href="/assets/css/main.css" />
    <link rel="stylesheet" href="/assets/css/home-content-alignment.css" />
    <link rel="stylesheet" href="/assets/css/brand-colors.css" />
    <link rel="icon" type="image/png" href="/images/white_icon_transparent.png">

    <!-- make body full-height flex so footer stays at bottom -->
    <style>
        body {
          display: flex;
          flex-direction: column;
          min-height: 100vh;
        }
        .wrapper {
          flex: 1;
        }
    </style>
</head>
<body class="is-preload">
<!-- header include -->
<div data-include="header"></div>

<main id="main-content" class="wrapper wrapper-inherit-padding">
    <div class="inner">
        <header class="special">
            <h2>
                <img src="/images/full-logo.svg" alt="Shevato – Expert Software Engineering Services Logo" width="250" height="219" fetchpriority="high" decoding="async">
            </h2>
            <p>Sorry, we couldn’t find that page.</p>
            <p>
                Redirecting to our <a href="/">home page</a> in
                <strong><span id="redirect-countdown" aria-live="polite" aria-atomic="true">5</span> seconds</strong>.
            </p>
        </header>
    </div>
</main>

<!-- footer include -->
<div data-include="footer"></div>

<!-- countdown + redirect script -->
<script defer src="/assets/js/redirect-countdown.js"></script>

<!-- Scripts: deferred so they run in document order after parse, before DOMContentLoaded. -->
<script defer src="/assets/js/passive-events-fix.js"></script>
<script defer src="/assets/js/jquery.min.js"></script>
<script defer src="/assets/js/browser.min.js"></script>
<script defer src="/assets/js/breakpoints.min.js"></script>
<script defer src="/assets/js/util.js"></script>

<!-- Firebase SDK (required for auth functionality) -->
<script defer src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script defer src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<!-- Main JavaScript -->
<script defer src="/assets/js/main.js"></script>
</body>
</html>
