<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Find TV shows by the shape of their IMDb episode ratings — rising, consistent, slow-burn, big-finale, or rebound seasons.">
  <meta name="author" content="Shevato LLC">
  <meta name="theme-color" content="#0b0d12">
  <link rel="canonical" href="https://shevato.com/apps/imdb-rising/index.html" />
  <title>Rising Seasons | TV by the shape of IMDb ratings - Shevato</title>

  <!-- Favicon: rising-curve glyph -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📈</text></svg>">

  <!-- Site chrome: main.css for #header / #footer / #menu styling, font-awesome
       for footer icons. App styles override what they need to. -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="rising-seasons-app">
  <div data-include="header"></div>

  <main class="page">
    <header class="hero">
      <h1>Rising Seasons</h1>
      <p class="tagline">Discover TV by the <em>shape</em> of its IMDb ratings — not the average.</p>
    </header>

    <nav class="shapes" id="shapes" aria-label="Rating shape">
      <button class="shape-chip" data-shape="all" aria-pressed="true" type="button">
        <span class="shape-name">All</span>
        <span class="shape-count" data-count="all"></span>
      </button>
      <button class="shape-chip" data-shape="rising" aria-pressed="false" type="button">
        <span class="shape-icon" aria-hidden="true">↗</span>
        <span class="shape-name">Rising</span>
        <span class="shape-desc">Each episode at least as good as the last</span>
        <span class="shape-count" data-count="rising"></span>
      </button>
      <button class="shape-chip" data-shape="consistent" aria-pressed="false" type="button">
        <span class="shape-icon" aria-hidden="true">═</span>
        <span class="shape-name">Consistent</span>
        <span class="shape-desc">Excellent throughout, no weak link</span>
        <span class="shape-count" data-count="consistent"></span>
      </button>
      <button class="shape-chip" data-shape="slow-burn" aria-pressed="false" type="button">
        <span class="shape-icon" aria-hidden="true">⤴</span>
        <span class="shape-name">Slow burn</span>
        <span class="shape-desc">Second half lifts off</span>
        <span class="shape-count" data-count="slow-burn"></span>
      </button>
      <button class="shape-chip" data-shape="big-finale" aria-pressed="false" type="button">
        <span class="shape-icon" aria-hidden="true">⇧</span>
        <span class="shape-name">Big finale</span>
        <span class="shape-desc">The last episode is the peak</span>
        <span class="shape-count" data-count="big-finale"></span>
      </button>
      <button class="shape-chip" data-shape="rebound" aria-pressed="false" type="button">
        <span class="shape-icon" aria-hidden="true">∪</span>
        <span class="shape-name">Rebound</span>
        <span class="shape-desc">Dips, then comes back stronger</span>
        <span class="shape-count" data-count="rebound"></span>
      </button>
    </nav>

    <section class="filters" aria-label="Filters">
      <div class="filter-row primary">
        <label class="search">
          <span class="visually-hidden">Search title</span>
          <input type="search" id="search" placeholder="Search title — press / to focus" autocomplete="off" aria-label="Search title">
        </label>
        <div class="view-toggle" role="radiogroup" aria-label="View mode">
          <button type="button" class="btn view-btn" data-view="grid" aria-pressed="true" aria-label="Grid view" title="Grid view">▦</button>
          <button type="button" class="btn view-btn" data-view="list" aria-pressed="false" aria-label="List view" title="List view">☰</button>
        </div>
        <button class="btn btn-primary surprise" id="surprise" type="button" title="Pick one at random">
          <span aria-hidden="true">🎲</span>
          <span>Surprise me</span>
        </button>
      </div>

      <details class="advanced">
        <summary>More filters</summary>
        <div class="filter-row">
          <label>
            Min episodes
            <input type="number" id="minEpisodes" min="1" value="4">
          </label>
          <label>
            Min votes / episode
            <input type="number" id="minVotes" min="0" step="100" value="1000">
          </label>
          <label>
            Year ≥
            <input type="number" id="minYear" min="1950" max="2100" placeholder="any">
          </label>
          <label>
            Year ≤
            <input type="number" id="maxYear" min="1950" max="2100" placeholder="any">
          </label>
          <label>
            Watched
            <select id="watchedFilter">
              <option value="all">All</option>
              <option value="unwatched">Unwatched only</option>
              <option value="watched">Watched only</option>
            </select>
          </label>
          <label>
            Sort by
            <select id="sort">
              <option value="popularity">Popularity (min votes)</option>
              <option value="length">Season length</option>
              <option value="climb">Rating climb (last − first)</option>
              <option value="finale">Finale rating</option>
              <option value="avg">Season average rating</option>
              <option value="recent">Most recent</option>
            </select>
          </label>
        </div>
        <div class="genre-row" id="genres" role="group" aria-label="Filter by genre"></div>
        <div class="filter-actions">
          <button type="button" class="btn btn-ghost" id="resetFilters">Reset all filters</button>
        </div>
      </details>
    </section>

    <section class="stats-bar" id="statsBar" aria-live="polite"></section>

    <p class="meta" id="meta" aria-live="polite"></p>

    <div id="results" class="results-grid" aria-label="Matching seasons"></div>

    <nav class="pager" id="pager" aria-label="Pagination" hidden></nav>

    <p class="footer-meta" id="footer-meta"></p>
  </main>

  <div data-include="footer"></div>

  <!-- Detail modal (opens when a card is clicked) -->
  <div class="modal" id="detailModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-hidden="true" hidden>
    <div class="modal-backdrop" data-close="modal"></div>
    <article class="modal-panel">
      <button type="button" class="btn modal-close" data-close="modal" aria-label="Close">×</button>
      <div class="modal-header">
        <div class="modal-poster" id="modalPoster" aria-hidden="true"></div>
        <div class="modal-heading">
          <h2 id="modalTitle"></h2>
          <p class="modal-subtitle" id="modalSubtitle"></p>
          <div class="modal-shapes" id="modalShapes"></div>
          <p class="modal-stats" id="modalStats"></p>
        </div>
      </div>
      <p class="modal-overview" id="modalOverview"></p>
      <h3 class="modal-section">Episode ratings</h3>
      <svg class="modal-curve" id="modalCurve" viewBox="0 0 600 180" preserveAspectRatio="none" aria-hidden="true">
        <path class="curve-area" />
        <path class="curve-line" />
        <g class="curve-dots"></g>
      </svg>
      <ol class="modal-episodes" id="modalEpisodes"></ol>
      <div class="modal-actions">
        <button type="button" class="btn watch-btn" id="modalWatchBtn"></button>
        <a class="btn btn-ghost modal-imdb" id="modalImdb" target="_blank" rel="noopener">View season on IMDb →</a>
      </div>
    </article>
  </div>

  <!-- Card template (grid view) -->
  <template id="card-template">
    <article class="card" tabindex="0" role="button">
      <div class="card-poster">
        <div class="poster-fallback" aria-hidden="true"></div>
        <button type="button" class="watch-toggle" aria-pressed="false" aria-label="Mark as watched" title="Mark as watched">
          <span class="watch-icon" aria-hidden="true">✓</span>
        </button>
      </div>
      <div class="card-body">
        <header class="card-head">
          <h2 class="card-title"></h2>
          <span class="card-season"></span>
        </header>
        <div class="card-meta">
          <span class="card-year"></span>
          <span class="card-genres"></span>
        </div>
        <div class="card-shapes"></div>
        <svg class="curve" viewBox="0 0 300 80" preserveAspectRatio="none" aria-hidden="true">
          <path class="curve-area" />
          <path class="curve-line" />
          <g class="curve-dots"></g>
        </svg>
        <div class="card-stats">
          <span class="stat-climb"></span>
          <span class="stat-avg"></span>
          <span class="stat-votes"></span>
        </div>
      </div>
    </article>
  </template>

  <!-- Row template (list view) -->
  <template id="row-template">
    <article class="row" tabindex="0" role="button">
      <div class="row-poster">
        <div class="poster-fallback" aria-hidden="true"></div>
      </div>
      <div class="row-main">
        <header class="row-head">
          <h2 class="row-title"></h2>
          <span class="row-season"></span>
          <span class="row-year"></span>
        </header>
        <div class="row-shapes"></div>
        <div class="row-stats">
          <span class="stat-climb"></span>
          <span class="stat-avg"></span>
          <span class="stat-votes"></span>
        </div>
      </div>
      <svg class="row-curve" viewBox="0 0 200 56" preserveAspectRatio="none" aria-hidden="true">
        <path class="curve-area" />
        <path class="curve-line" />
      </svg>
      <button type="button" class="watch-toggle row-watch" aria-pressed="false" aria-label="Mark as watched" title="Mark as watched">
        <span class="watch-icon" aria-hidden="true">✓</span>
      </button>
    </article>
  </template>

  <!-- Skeleton card template -->
  <template id="skeleton-template">
    <article class="card skeleton" aria-hidden="true">
      <div class="card-poster"><div class="skeleton-block"></div></div>
      <div class="card-body">
        <div class="skeleton-line w-70"></div>
        <div class="skeleton-line w-40"></div>
        <div class="skeleton-block sk-curve"></div>
        <div class="skeleton-line w-90"></div>
      </div>
    </article>
  </template>

  <!-- App script — vanilla, no jQuery dependency -->
  <script src="js/app.js" defer></script>
</body>
</html>
